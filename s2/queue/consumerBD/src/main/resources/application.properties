spring.application.name=consumerBD

# Настройки подключения к БД
spring.datasource.url=jdbc:postgresql://pg_master:5432/auto_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Worker ID (можно задать через переменную окружения)
consumer.worker-id=${WORKER_ID:worker-1}

